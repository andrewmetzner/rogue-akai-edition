<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RogueLike</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #ccc;
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }
      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #canvas {
        display: block;
        image-rendering: pixelated;
      }
      #hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: #aaa;
        padding: 0 4px;
      }
      #log {
        width: 100%;
        height: 64px;
        overflow: hidden;
        font-size: 12px;
        color: #888;
        padding: 0 4px;
        display: flex;
        flex-direction: column-reverse;
      }
      .log-line { line-height: 1.4; }
      .log-line.new { color: #ddd; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <span id="hud-left"></span>
        <span id="hud-right"></span>
      </div>
      <canvas id="canvas"></canvas>
      <div id="log"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
